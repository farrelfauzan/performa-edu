# Production overrides - use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    # In production, consider not exposing ports externally
    # ports: []

  api-gateway:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${API_GATEWAY_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      AUTH_SERVICE_GRPC_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      CONTENT_SERVICE_GRPC_HOST: content-service
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      CUSTOMER_SERVICE_GRPC_HOST: customer-service
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      REDIS_URL: ${REDIS_URL}
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  auth-service:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      AUTH_SERVICE_GRPC_HOST: 0.0.0.0
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      REDIS_URL: ${REDIS_URL}
    volumes: []
    # Don't expose gRPC ports externally in production
    ports: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  content-service:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      CONTENT_SERVICE_GRPC_HOST: 0.0.0.0
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      HLS_CONVERTER_URL: ${HLS_CONVERTER_URL:-}
      HLS_CONVERTER_API_KEY: ${HLS_CONVERTER_API_KEY:-}
    volumes: []
    ports: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  customer-service:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      CUSTOMER_SERVICE_GRPC_HOST: 0.0.0.0
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes: []
    ports: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
