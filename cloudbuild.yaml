steps:
  # Build API Gateway
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:latest'
      - '-f'
      - 'apps/api-gateway/Dockerfile'
      - '--target'
      - 'production'
      - '.'
    id: 'build-api-gateway'

  # Build Auth Service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/auth-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/auth-service:latest'
      - '-f'
      - 'apps/auth-service/Dockerfile'
      - '--target'
      - 'production'
      - '.'
    id: 'build-auth-service'

  # Build Content Service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/content-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/content-service:latest'
      - '-f'
      - 'apps/content-service/Dockerfile'
      - '--target'
      - 'production'
      - '.'
    id: 'build-content-service'

  # Build Customer Service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/customer-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/customer-service:latest'
      - '-f'
      - 'apps/customer-service/Dockerfile'
      - '--target'
      - 'production'
      - '.'
    id: 'build-customer-service'

  # Push images in parallel
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-gateway:$COMMIT_SHA']
    id: 'push-api-gateway'
    waitFor: ['build-api-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-gateway:latest']
    waitFor: ['build-api-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/auth-service:$COMMIT_SHA']
    id: 'push-auth-service'
    waitFor: ['build-auth-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/auth-service:latest']
    waitFor: ['build-auth-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/content-service:$COMMIT_SHA']
    id: 'push-content-service'
    waitFor: ['build-content-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/content-service:latest']
    waitFor: ['build-content-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/customer-service:$COMMIT_SHA']
    id: 'push-customer-service'
    waitFor: ['build-customer-service']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/customer-service:latest']
    waitFor: ['build-customer-service']

  # Deploy Auth Service (internal gRPC)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'auth-service'
      - '--image=gcr.io/$PROJECT_ID/auth-service:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--use-http2'
      - '--port=5001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=NODE_ENV=production,AUTH_SERVICE_GRPC_HOST=0.0.0.0,AUTH_SERVICE_GRPC_PORT=5001'
      - '--set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest,REDIS_URL=redis-url:latest'
      - '--vpc-connector=$_VPC_CONNECTOR'
      - '--set-cloudsql-instances=$_SQL_INSTANCE'
      - '--service-account=auth-service-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: 'deploy-auth-service'
    waitFor: ['push-auth-service']

  # Deploy Content Service (internal gRPC)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'content-service'
      - '--image=gcr.io/$PROJECT_ID/content-service:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--use-http2'
      - '--port=5002'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=NODE_ENV=production,CONTENT_SERVICE_GRPC_HOST=0.0.0.0,CONTENT_SERVICE_GRPC_PORT=5002'
      - '--set-secrets=DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest'
      - '--vpc-connector=$_VPC_CONNECTOR'
      - '--set-cloudsql-instances=$_SQL_INSTANCE'
      - '--service-account=content-service-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: 'deploy-content-service'
    waitFor: ['push-content-service']

  # Deploy Customer Service (internal gRPC)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'customer-service'
      - '--image=gcr.io/$PROJECT_ID/customer-service:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--use-http2'
      - '--port=5003'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=NODE_ENV=production,CUSTOMER_SERVICE_GRPC_HOST=0.0.0.0,CUSTOMER_SERVICE_GRPC_PORT=5003'
      - '--set-secrets=DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest'
      - '--vpc-connector=$_VPC_CONNECTOR'
      - '--set-cloudsql-instances=$_SQL_INSTANCE'
      - '--service-account=customer-service-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: 'deploy-customer-service'
    waitFor: ['push-customer-service']

  # Deploy API Gateway (public-facing)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'api-gateway'
      - '--image=gcr.io/$PROJECT_ID/api-gateway:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production,PORT=3000'
      - '--set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,REDIS_URL=redis-url:latest'
      - '--vpc-connector=$_VPC_CONNECTOR'
      - '--set-cloudsql-instances=$_SQL_INSTANCE'
      - '--service-account=api-gateway-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: 'deploy-api-gateway'
    waitFor: ['deploy-auth-service', 'deploy-content-service', 'deploy-customer-service', 'push-api-gateway']

  # Update API Gateway with service URLs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        AUTH_URL=$(gcloud run services describe auth-service --region=$_REGION --format='value(status.url)')
        CONTENT_URL=$(gcloud run services describe content-service --region=$_REGION --format='value(status.url)')
        CUSTOMER_URL=$(gcloud run services describe customer-service --region=$_REGION --format='value(status.url)')
        
        gcloud run services update api-gateway \
          --region=$_REGION \
          --update-env-vars="AUTH_SERVICE_GRPC_HOST=${AUTH_URL#https://},AUTH_SERVICE_GRPC_PORT=443,CONTENT_SERVICE_GRPC_HOST=${CONTENT_URL#https://},CONTENT_SERVICE_GRPC_PORT=443,CUSTOMER_SERVICE_GRPC_HOST=${CUSTOMER_URL#https://},CUSTOMER_SERVICE_GRPC_PORT=443"
    id: 'update-api-gateway-env'
    waitFor: ['deploy-api-gateway']

substitutions:
  _REGION: asia-southeast1
  _VPC_CONNECTOR: serverless-connector
  _SQL_INSTANCE: ${PROJECT_ID}:asia-southeast1:performa-edu-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - 'gcr.io/$PROJECT_ID/api-gateway:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/api-gateway:latest'
  - 'gcr.io/$PROJECT_ID/auth-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/auth-service:latest'
  - 'gcr.io/$PROJECT_ID/content-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/content-service:latest'
  - 'gcr.io/$PROJECT_ID/customer-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/customer-service:latest'

timeout: '1800s'
