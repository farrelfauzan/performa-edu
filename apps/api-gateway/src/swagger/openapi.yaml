  /assignments/progress:
    put:
      tags: [Assignments]
      summary: Update progress
      description: |
        Student logs a progress action (complete a section or answer a question).
        Idempotent — logging the same action twice returns `alreadyLogged: true`.
        Progress percentage is auto-calculated based on completed items vs total content sections.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentId, action]
              properties:
                contentId:
                  type: string
                action:
                  type: string
                  enum: [COMPLETE_SECTION, ANSWER_QUESTION]
                sectionId:
                  type: string
                  description: Required when action is COMPLETE_SECTION
                questionId:
                  type: string
                  description: Required when action is ANSWER_QUESTION
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Assignment'
                  alreadyLogged:
                    type: boolean

  /assignments/{studentId}/{contentId}/progress:
    get:
      tags: [Assignments]
      summary: Get progress logs
      description: View detailed progress logs for a student's assignment
      security:
        - BearerAuth: []
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
        - name: contentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Progress logs retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProgressLog'
                  progress:
                    type: number
                    format: float
                  completedItems:
                    type: integer
                  totalItems:
                    type: integer
