syntax = "proto3";

package authservice;

// The AuthService defines authentication and user management operations
service AuthService {
    // Authenticates a user with username/email and password
    rpc Login(LoginRequest) returns (LoginResponse);
    // Registers a new admin user with specified roles
    rpc RegisterAdmin(RegisterAdminRequest) returns (RegisterAdminResponse);
    // Registers a new customer user with profile information
    rpc RegisterCustomer(RegisterCustomerRequest) returns (RegisterCustomerResponse);
    // Retrieves the authenticated user's profile information
    rpc GetMe(ProfileRequest) returns (ProfileResponse);
    // Retrieves basic user information by user ID
    rpc GetUserById(GetUserByIdRequest) returns (BasicUserResponse);
    // Create a new user
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    // Delete user by ID
    rpc DeleteUserById(DeleteUserByIdRequest) returns (DeleteUserByIdResponse);
    // Request a password reset token for a user by email
    rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
    // Reset password using a valid reset token
    rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
    // Update user profile (name, bio, profile picture URL)
    rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse);
    // Generate presigned URL for profile picture upload
    rpc GetProfilePictureUploadUrl(ProfilePictureUploadUrlRequest) returns (ProfilePictureUploadUrlResponse);
    // Get roles by optional name filter
    rpc GetRoles(GetRolesRequest) returns (GetRolesResponse);
}

message BasicUserResponse {
    string id = 1;
    string username = 2;
    string email = 3;
}

message GetUserByIdRequest {
    string id = 1;
}

message Role {
    string id = 1;
    string name = 2;
    repeated Permissions permissions = 3;
}

message Permissions {
    string action = 1;
    string subject = 2;
    optional string condition = 3;
}

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    repeated Role roles = 4;
}

message Admin {
    string id = 1;
    string user_id = 2;
    string email = 3;
    string active = 4;
    string created_at = 5;
    string updated_at = 6;
    string deleted_at = 7;
}

message Customer {
    string id = 1;
    string unique_id = 2;
    string email = 3;
    string full_name = 4;
    string phone_number = 5;
    optional string date_of_birth = 7;
    string active = 8;
    string created_at = 9;
    string updated_at = 10;
    optional string deleted_at = 11;
}

message LoginRequest {
    string username_or_email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    User user = 3;
}

message RegisterAdminRequest {
    string email = 1;
    string username = 2;
    string password = 3;
    repeated string role_ids = 4;
}

message RegisterAdminResponse {
    Admin admin = 1;
    User user = 2;
}

message RegisterCustomerRequest {
    string username = 1;
    string email = 2;
    string password = 3;
    string full_name = 4;
    string date_of_birth = 5;
    string phone_number = 6;
    optional string profile_picture = 7;
}

message RegisterCustomerResponse {
    User user = 1;
    Customer customer = 2;
}
    

message ProfileRequest {
    string user_id = 1;
}

message ProfileResponse {
    string id = 1;
    string username = 2;
    string unique_id = 3;
    string email = 4;
    repeated Role roles = 5;
    string full_name = 6;
    string active = 7;
    optional string profile_picture = 8;
    optional string date_of_birth = 9;
    optional string phone_number = 10;
    optional string created_at = 11;
    optional string updated_at = 12;
    optional string deleted_at = 13;
    optional string user_id = 14;
}

message CreateUserRequest {
    string username = 1;
    string email = 2;
    string password = 3;
    repeated string role_ids = 4;
}

message CreateUserResponse {
    string id = 1;
    string username = 2;
    string email = 3;
    string active = 4;
    repeated Role roles = 5;
    string created_at = 6;
    string updated_at = 7;
    string deleted_at = 8;
}

message DeleteUserByIdRequest {
    string id = 1;
}

message DeleteUserByIdResponse {
    string message = 1;
}

message RequestPasswordResetRequest {
    string email = 1;
}

message RequestPasswordResetResponse {
    string message = 1;
    string reset_token = 2;
}

message ResetPasswordRequest {
    string token = 1;
    string new_password = 2;
}

message ResetPasswordResponse {
    string message = 1;
}

message UpdateProfileRequest {
    string user_id = 1;
    optional string full_name = 2;
    optional string profile_picture_url = 3;
    optional string bio = 4;
}

message ProfilePictureUploadUrlRequest {
    string user_id = 1;
    string filename = 2;
    string content_type = 3;
}

message ProfilePictureUploadUrlResponse {
    string upload_url = 1;
    map<string, string> fields = 2;
    string s3_key = 3;
    string public_url = 4;
    int32 expires_in = 5;
}

message GetRolesRequest {
    optional string name = 1;
}

message GetRolesResponse {
    repeated Role roles = 1;
}