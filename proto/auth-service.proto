syntax = "proto3";

package authservice;

service AuthService {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc RegisterAdmin(RegisterAdminRequest) returns (RegisterAdminResponse);
    rpc RegisterStudent(RegisterStudentRequest) returns (RegisterStudentResponse);
    rpc RegisterTeacher(RegisterTeacherRequest) returns (RegisterTeacherResponse);
}


message Role {
    string id = 1;
    string name = 2;
    repeated string permissions = 3;
}

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    repeated Role roles = 4;
}

message Admin {
    string id = 1;
    string user_id = 2;
    string email = 3;
    string active = 4;
    string created_at = 5;
    string updated_at = 6;
    string deleted_at = 7;
}

message Student {
    string id = 1;
    string user_id = 2;
    string student_number = 3;
    string first_name = 4;
    string last_name = 5;
    string phone_number = 6;
    string address = 7;
    string email = 8;
    string created_at = 9;
    string updated_at = 10;
    string deleted_at = 11;
}

message Teacher {
    string id = 1;
    string user_id = 2;
    string teacher_number = 3;
    string first_name = 4;
    string last_name = 5;
    string phone_number = 6;
    string address = 7;
    string email = 8;
    string created_at = 9;
    string updated_at = 10;
    string deleted_at = 11;
}

message LoginRequest {
    string username_or_email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    User user = 3;
}

message RegisterAdminRequest {
    string email = 1;
    string username = 2;
    string password = 3;
    repeated string role_ids = 4;
    string user_id = 5;
}

message RegisterStudentRequest {
    string email = 1;
    string username = 2;
    string password = 3;
    repeated string role_ids = 4;
    string user_id = 5;
    string student_number = 6;
    string first_name = 7;
    string last_name = 8;
    string phone_number = 9;
    string address = 10;
}

message RegisterTeacherRequest {
    string email = 1;
    string username = 2;
    string password = 3;
    repeated string role_ids = 4;
    string user_id = 5;
    string teacher_number = 6;
    string first_name = 7;
    string last_name = 8;
    string phone_number = 9;
    string address = 10;
}

message RegisterAdminResponse {
    Admin admin = 1;
    User user = 2;
}

message RegisterStudentResponse {
    Student student = 1;
    User user = 2;
} 

message RegisterTeacherResponse {
    Teacher teacher = 1;
    User user = 2;
}