syntax = "proto3";

package authservice;

service AuthService {
    rpc Login(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
    string username_or_email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    User user = 3;
}

message User {
    string id = 1;
    string username = 2;
    string email = 3;
}