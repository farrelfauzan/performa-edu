syntax = "proto3";

package teacherservice;

// Teacher Service Definition
service TeacherService {
    // Teacher CRUD Operations
    rpc CreateTeacher(CreateTeacherRequest) returns (CreateTeacherResponse);
    // Retrieve a teacher by their unique ID
    rpc GetTeacherById(GetTeacherByIdRequest) returns (GetTeacherByIdResponse);
    // Update an existing teacher's information
    rpc UpdateTeacher(UpdateTeacherRequest) returns (UpdateTeacherResponse);
    // Delete a teacher by their unique ID
    rpc DeleteTeacher(DeleteTeacherRequest) returns (DeleteTeacherResponse);
    // Retrieve all teachers with optional pagination, filtering, and sorting
    rpc GetAllTeachers(GetAllTeachersRequest) returns (GetAllTeachersResponse);
}

enum Order {
    ASC = 0;
    DESC = 1;
}

message Filter {
    map<string, string> values = 1;
}

message PageMeta {
    int32 page = 1;
    int32 page_size = 2;
    int32 count = 3;
    optional int32 page_count = 4;
    optional bool has_previous_page = 5;
    optional bool has_next_page = 6;
}

message Role {
    string id = 1;
    string name = 2;
    repeated string permissions = 3;
}

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    repeated Role roles = 4;
}

message Teacher {
    string id = 1;
    string unique_id = 2;
    string full_name = 3;
    string phone_number = 4;
    optional string date_of_birth = 5;
    optional User user = 6;
    optional string branch_id = 7;
    optional string branch_name = 8;
    string created_at = 9;
    string updated_at = 10;
    optional string deleted_at = 11;
}

message CreateTeacherRequest {
    string user_id = 1;
    string full_name = 2;
    string phone_number = 3;
    string branch_id = 4;
    string branch_name = 5;
    optional string date_of_birth = 6;
}

message CreateTeacherResponse {
    Teacher teacher = 1;
}

message GetTeacherByIdRequest {
    string id = 1;
}

message GetTeacherByIdResponse {
    Teacher teacher = 1;
}

message UpdateTeacherRequest {
    string id = 1;
    optional string full_name = 2;
    optional string phone_number = 3;
    optional string date_of_birth = 4;
    optional string branch_id = 5;
    optional string branch_name = 6;
}

message UpdateTeacherResponse {
    Teacher teacher = 1;
}

message DeleteTeacherRequest {
    string id = 1;
}

message DeleteTeacherResponse {
    string message = 1;
}

message GetAllTeachersRequest {
    optional int32 page = 1;
    optional int32 page_size = 2;
    optional Order order = 3;
    optional int32 skip = 4;
    optional Filter filter = 5;
    optional string sort_by = 6;
    optional string query = 7;
    optional string search = 8;
}

message GetAllTeachersResponse {
    repeated Teacher teachers = 1;
    PageMeta meta = 2;
}
