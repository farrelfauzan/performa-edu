syntax = "proto3";

package authservicehealth;

service AuthServiceHealth {
  rpc Check(Empty) returns (AuthServiceHealthCheckResponse);
  rpc Watch(Empty) returns (stream AuthServiceHealthCheckResponse);
}

service AuthServiceHealthMonitor {
  rpc CheckLiveness(Empty) returns (AuthServiceHealthCheckResponse);
  rpc CheckReadiness(Empty) returns (AuthServiceHealthCheckResponse);
}

message Empty {}

message AuthServiceHealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
  map<string, string> details = 2;
}
