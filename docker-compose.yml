version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:16-alpine
    container_name: performa-edu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-performa_edu_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-performa_edu_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - performa-network

  redis:
    image: redis:7-alpine
    container_name: performa-edu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - performa-network

  # Application Services
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    container_name: performa-edu-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${API_GATEWAY_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-performa_edu_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production-minimum-32-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      AUTH_SERVICE_GRPC_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      CONTENT_SERVICE_GRPC_HOST: content-service
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      CUSTOMER_SERVICE_GRPC_HOST: customer-service
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_GATEWAY_PORT:-3000}:${API_GATEWAY_PORT:-3000}"
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      content-service:
        condition: service_started
      customer-service:
        condition: service_started
    networks:
      - performa-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
      target: development
    container_name: performa-edu-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_SERVICE_GRPC_HOST: 0.0.0.0
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-performa_edu_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production-minimum-32-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      REDIS_URL: redis://redis:6379
    ports:
      - "${AUTH_SERVICE_GRPC_PORT:-50051}:${AUTH_SERVICE_GRPC_PORT:-50051}"
    volumes:
      - ./apps/auth-service/src:/app/apps/auth-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - performa-network

  content-service:
    build:
      context: .
      dockerfile: apps/content-service/Dockerfile
      target: development
    container_name: performa-edu-content-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CONTENT_SERVICE_GRPC_HOST: 0.0.0.0
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-performa_edu_db}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${CONTENT_SERVICE_GRPC_PORT:-50052}:${CONTENT_SERVICE_GRPC_PORT:-50052}"
    volumes:
      - ./apps/content-service/src:/app/apps/content-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - performa-network

  customer-service:
    build:
      context: .
      dockerfile: apps/customer-service/Dockerfile
      target: development
    container_name: performa-edu-customer-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CUSTOMER_SERVICE_GRPC_HOST: 0.0.0.0
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-performa_edu_db}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${CUSTOMER_SERVICE_GRPC_PORT:-50053}:${CUSTOMER_SERVICE_GRPC_PORT:-50053}"
    volumes:
      - ./apps/customer-service/src:/app/apps/customer-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - performa-network

networks:
  performa-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
