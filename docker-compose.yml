services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: performa-edu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - performa-network

  # Init: reset Nx cache before starting services
  nx-reset:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    container_name: performa-edu-nx-reset
    command: ["pnpm", "nx", "reset"]
    networks:
      - performa-network

  # Application Services
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    container_name: performa-edu-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${API_GATEWAY_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      AUTH_SERVICE_GRPC_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      CONTENT_SERVICE_GRPC_HOST: content-service
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      CUSTOMER_SERVICE_GRPC_HOST: customer-service
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      STUDENT_SERVICE_GRPC_HOST: student-service
      STUDENT_SERVICE_GRPC_PORT: ${STUDENT_SERVICE_GRPC_PORT:-50054}
      QUIZ_SERVICE_GRPC_HOST: quiz-service
      QUIZ_SERVICE_GRPC_PORT: ${QUIZ_SERVICE_GRPC_PORT:-50055}
      CLASS_SERVICE_GRPC_HOST: class-service
      CLASS_SERVICE_GRPC_PORT: ${CLASS_SERVICE_GRPC_PORT:-50056}
      BRANCH_SERVICE_GRPC_HOST: branch-service
      BRANCH_SERVICE_GRPC_PORT: ${BRANCH_SERVICE_GRPC_PORT:-50057}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_GATEWAY_PORT:-3000}:${API_GATEWAY_PORT:-3000}"
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      content-service:
        condition: service_started
      customer-service:
        condition: service_started
      student-service:
        condition: service_started
      quiz-service:
        condition: service_started
      class-service:
        condition: service_started
      branch-service:
        condition: service_started
    networks:
      - performa-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
      target: development
    container_name: performa-edu-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_SERVICE_GRPC_HOST: 0.0.0.0
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      REDIS_URL: redis://redis:6379
    ports:
      - "${AUTH_SERVICE_GRPC_PORT:-50051}:${AUTH_SERVICE_GRPC_PORT:-50051}"
    volumes:
      - ./apps/auth-service/src:/app/apps/auth-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  content-service:
    build:
      context: .
      dockerfile: apps/content-service/Dockerfile
      target: development
    container_name: performa-edu-content-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CONTENT_SERVICE_GRPC_HOST: 0.0.0.0
      CONTENT_SERVICE_GRPC_PORT: ${CONTENT_SERVICE_GRPC_PORT:-50052}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      HLS_CONVERTER_URL: ${HLS_CONVERTER_URL:-}
      HLS_CONVERTER_API_KEY: ${HLS_CONVERTER_API_KEY:-}
    ports:
      - "${CONTENT_SERVICE_GRPC_PORT:-50052}:${CONTENT_SERVICE_GRPC_PORT:-50052}"
    volumes:
      - ./apps/content-service/src:/app/apps/content-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  customer-service:
    build:
      context: .
      dockerfile: apps/customer-service/Dockerfile
      target: development
    container_name: performa-edu-customer-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CUSTOMER_SERVICE_GRPC_HOST: 0.0.0.0
      CUSTOMER_SERVICE_GRPC_PORT: ${CUSTOMER_SERVICE_GRPC_PORT:-50053}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    ports:
      - "${CUSTOMER_SERVICE_GRPC_PORT:-50053}:${CUSTOMER_SERVICE_GRPC_PORT:-50053}"
    volumes:
      - ./apps/customer-service/src:/app/apps/customer-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  student-service:
    build:
      context: .
      dockerfile: apps/student-service/Dockerfile
      target: development
    container_name: performa-edu-student-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      STUDENT_SERVICE_GRPC_HOST: 0.0.0.0
      STUDENT_SERVICE_GRPC_PORT: ${STUDENT_SERVICE_GRPC_PORT:-50054}
      AUTH_SERVICE_GRPC_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: ${AUTH_SERVICE_GRPC_PORT:-50051}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    ports:
      - "${STUDENT_SERVICE_GRPC_PORT:-50054}:${STUDENT_SERVICE_GRPC_PORT:-50054}"
    volumes:
      - ./apps/student-service/src:/app/apps/student-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  quiz-service:
    build:
      context: .
      dockerfile: apps/quiz-service/Dockerfile
      target: development
    container_name: performa-edu-quiz-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      QUIZ_SERVICE_GRPC_HOST: 0.0.0.0
      QUIZ_SERVICE_GRPC_PORT: ${QUIZ_SERVICE_GRPC_PORT:-50055}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-performa-assets}
    ports:
      - "${QUIZ_SERVICE_GRPC_PORT:-50055}:${QUIZ_SERVICE_GRPC_PORT:-50055}"
    volumes:
      - ./apps/quiz-service/src:/app/apps/quiz-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  class-service:
    build:
      context: .
      dockerfile: apps/class-service/Dockerfile
      target: development
    container_name: performa-edu-class-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CLASS_SERVICE_GRPC_HOST: 0.0.0.0
      CLASS_SERVICE_GRPC_PORT: ${CLASS_SERVICE_GRPC_PORT:-50056}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    ports:
      - "${CLASS_SERVICE_GRPC_PORT:-50056}:${CLASS_SERVICE_GRPC_PORT:-50056}"
    volumes:
      - ./apps/class-service/src:/app/apps/class-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

  branch-service:
    build:
      context: .
      dockerfile: apps/branch-service/Dockerfile
      target: development
    container_name: performa-edu-branch-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      BRANCH_SERVICE_GRPC_HOST: 0.0.0.0
      BRANCH_SERVICE_GRPC_PORT: ${BRANCH_SERVICE_GRPC_PORT:-50057}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    ports:
      - "${BRANCH_SERVICE_GRPC_PORT:-50057}:${BRANCH_SERVICE_GRPC_PORT:-50057}"
    volumes:
      - ./apps/branch-service/src:/app/apps/branch-service/src:ro
      - ./libs/src:/app/libs/src:ro
      - ./proto:/app/proto:ro
      - ./types:/app/types:ro
    depends_on:
      nx-reset:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - performa-network

networks:
  performa-network:
    driver: bridge
    name: performa-network

volumes:
  redis_data:
