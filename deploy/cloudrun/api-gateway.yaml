apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-gateway
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "Performa-Edu API Gateway - Public facing REST API"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cloudsql-instances: PROJECT_ID:asia-southeast1:performa-edu-db
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/asia-southeast1/connectors/serverless-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: api-gateway-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/api-gateway:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE_GRPC_HOST
              value: "auth-service-xxxx-xx.a.run.app"
            - name: AUTH_SERVICE_GRPC_PORT
              value: "443"
            - name: CONTENT_SERVICE_GRPC_HOST
              value: "content-service-xxxx-xx.a.run.app"
            - name: CONTENT_SERVICE_GRPC_PORT
              value: "443"
            - name: TEACHER_SERVICE_GRPC_HOST
              value: "teacher-service-xxxx-xx.a.run.app"
            - name: TEACHER_SERVICE_GRPC_PORT
              value: "443"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
