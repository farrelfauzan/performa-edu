apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: content-service
  labels:
    cloud.googleapis.com/location: asia-southeast1
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: "Performa-Edu Content Service - Internal gRPC content management service"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cloudsql-instances: PROJECT_ID:asia-southeast1:performa-edu-db
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/asia-southeast1/connectors/serverless-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 50
      timeoutSeconds: 300
      serviceAccountName: content-service-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/content-service:latest
          ports:
            - containerPort: 5002
              name: h2c
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: CONTENT_SERVICE_GRPC_HOST
              value: "0.0.0.0"
            - name: CONTENT_SERVICE_GRPC_PORT
              value: "5002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
          startupProbe:
            grpc:
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5
          livenessProbe:
            grpc:
              port: 5002
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            grpc:
              port: 5002
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
